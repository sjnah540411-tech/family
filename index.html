<style>
/* 업로드 방식 카드 */

  border:2px solid rgba(44,26,14,0.10);border-radius:14px;padding:16px 14px;
  cursor:pointer;transition:var(--transition);text-align:center;background:var(--cream);
}

.umode-card.active { border-color:var(--gold);background:#fffbf2;box-shadow:0 4px 16px rgba(212,168,83,0.18); }
.umode-icon { font-size:1.8rem;margin-bottom:6px; }
.umode-title { font-weight:700;font-size:0.9rem;color:var(--brown-deep);margin-bottom:4px; }
.umode-desc { font-size:0.75rem;color:var(--text-sub);line-height:1.5;margin-bottom:8px; }
.umode-badge { font-size:0.68rem;padding:3px 10px;border-radius:20px;display:inline-block; }

/* 호스팅 타입 버튼 */
.host-type-btn {
  padding:7px 14px;border-radius:8px;border:1.5px solid rgba(44,26,14,0.12);
  background:var(--cream);color:var(--text-sub);font-size:0.8rem;cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;transition:var(--transition);
}
.host-type-btn.active { background:var(--brown-deep);color:var(--gold-light);border-color:var(--brown-deep); }
</style>

<script>
// ════════════════════════════════════════
//  AUTH & PERMISSION SYSTEM
// ════════════════════════════════════════

// ── 스토리지 헬퍼 ──
function getUsers(){ try{return JSON.parse(localStorage.getItem('fa_users')||'[]');}catch{return[];} }
function saveUsers(u){ localStorage.setItem('fa_users', JSON.stringify(u)); }
function getSession(){ try{return JSON.parse(sessionStorage.getItem('fa_session')||'null');}catch{return null;} }

// ── 세션 가드: 로그인 안 된 경우 auth 페이지로 ──
(function authGuard(){
  // 관리자 초기 계정 시드 (최초 1회)
  const users = getUsers();
  if(!users.find(u=>u.id==='나')){
    users.push({
      id:'나', name:'나 (관리자·아버지)', role:'나', group:'direct',
      pw: btoa('admin1234'),   // 초기 비밀번호 — 반드시 변경!
      status:'approved', isAdmin:true,
      canUpload:true, canPost:true,
      joinedAt: new Date().toISOString()
    });
    saveUsers(users);
  }
  const sess = getSession();
  if(!sess) { window.location.href = 'auth.html'; }
})();

// ── 현재 세션 유저 ──
const SESSION = getSession() || {};

// ── 권한 체크 ──
function canUpload(){ return SESSION.isAdmin || SESSION.canUpload; }
function canPost(){   return SESSION.isAdmin || SESSION.canPost;   }
function isAdmin(){   return !!SESSION.isAdmin; }

// ── 로그아웃 ──
function logout(){
  if(!confirm('로그아웃 하시겠습니까?')) return;
  sessionStorage.removeItem('fa_session');
  window.location.href = 'auth.html';
}

// ────────────────────────────────────────
//  ADMIN PANEL
// ────────────────────────────────────────
function openAdminPanel(){
  if(!isAdmin()){ alert('관리자 전용 기능입니다.'); return; }
  document.getElementById('admin-panel-overlay').style.display='flex';
  apTab('pending');
}
function closeAdminPanel(){
  document.getElementById('admin-panel-overlay').style.display='none';
}

// 탭 스위치
function apTab(tab){
  document.querySelectorAll('.ap-tab').forEach(el=>{
    el.style.borderBottomColor = 'transparent';
    el.style.color = 'var(--text-sub)';
    el.style.fontWeight = '400';
  });
  const idx = {pending:0,members:1,permissions:2,pw:3}[tab];
  const tabs = document.querySelectorAll('.ap-tab');
  if(tabs[idx]){
    tabs[idx].style.borderBottomColor = 'var(--gold)';
    tabs[idx].style.color = 'var(--brown-deep)';
    tabs[idx].style.fontWeight = '600';
  }
  const body = document.getElementById('ap-body');
  if(tab==='pending')     body.innerHTML = renderPendingTab();
  if(tab==='members')     body.innerHTML = renderMembersTab();
  if(tab==='permissions') body.innerHTML = renderPermissionsTab();
  if(tab==='pw')          body.innerHTML = renderPwTab();

  // 뱃지
  const pending = getUsers().filter(u=>u.status==='pending');
  const badge = document.getElementById('badge-pending');
  badge.textContent = pending.length || '';
  badge.style.display = pending.length ? 'inline' : 'none';
}

// ── 탭 1: 승인 대기 ──
function renderPendingTab(){
  const users = getUsers().filter(u=>u.status==='pending');
  if(!users.length) return `<div style="text-align:center;padding:40px;color:var(--text-sub);">
    <div style="font-size:2.5rem">✅</div><p style="margin-top:8px;">대기 중인 가입 신청이 없습니다</p></div>`;
  return users.map(u=>`
    <div style="background:var(--cream);border-radius:12px;padding:18px;margin-bottom:12px;border:1px solid rgba(44,26,14,0.08);">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <div style="width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--brown-light),var(--gold));display:flex;align-items:center;justify-content:center;font-size:1.3rem;color:white;flex-shrink:0;">👤</div>
        <div style="flex:1;min-width:140px;">
          <div style="font-weight:600;color:var(--brown-deep);">${u.name} <span style="background:rgba(212,168,83,0.2);color:#7a5c1e;font-size:0.7rem;padding:2px 8px;border-radius:20px;font-weight:400;">${u.role}</span></div>
          <div style="font-size:0.78rem;color:var(--text-sub);margin-top:3px;">신청일: ${u.requestedAt ? new Date(u.requestedAt).toLocaleDateString('ko-KR') : '-'}</div>
          ${u.memo ? `<div style="font-size:0.8rem;color:var(--brown-mid);margin-top:4px;">"${u.memo}"</div>` : ''}
        </div>
        <div style="display:flex;gap:8px;flex-shrink:0;">
          <button onclick="approveUser('${u.id}')" style="background:var(--sage);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:0.82rem;cursor:pointer;font-family:'Noto Sans KR',sans-serif;">✅ 승인</button>
          <button onclick="rejectUser('${u.id}')" style="background:var(--rust);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:0.82rem;cursor:pointer;font-family:'Noto Sans KR',sans-serif;">❌ 거절</button>
        </div>
      </div>
    </div>`).join('');
}

// ── 탭 2: 구성원 목록 ──
function renderMembersTab(){
  const users = getUsers().filter(u=>u.status==='approved');
  return users.map(u=>`
    <div style="background:var(--cream);border-radius:12px;padding:16px;margin-bottom:10px;border:1px solid rgba(44,26,14,0.08);display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
      <div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,${u.isAdmin?'var(--gold),var(--rust)':'var(--brown-light),var(--gold-light)'});display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:white;flex-shrink:0;">${u.isAdmin?'👑':'👤'}</div>
      <div style="flex:1;min-width:120px;">
        <span style="font-weight:600;color:var(--brown-deep);">${u.name}</span>
        <span style="background:${u.isAdmin?'rgba(212,168,83,0.25)':'rgba(122,140,110,0.15)'};color:${u.isAdmin?'#7a5c1e':'#4a6741'};font-size:0.7rem;padding:2px 8px;border-radius:20px;margin-left:6px;">${u.isAdmin?'관리자':u.role}</span>
        <div style="font-size:0.75rem;color:var(--text-sub);margin-top:2px;">가입: ${u.joinedAt ? new Date(u.joinedAt).toLocaleDateString('ko-KR') : '-'}</div>
      </div>
      <div style="display:flex;gap:6px;flex-shrink:0;">
        <span style="padding:4px 10px;border-radius:20px;font-size:0.72rem;background:${u.canUpload?'rgba(122,140,110,0.15)':'rgba(44,26,14,0.07)'};color:${u.canUpload?'#4a6741':'var(--text-sub)'};">📸 업로드 ${u.canUpload?'O':'X'}</span>
        <span style="padding:4px 10px;border-radius:20px;font-size:0.72rem;background:${u.canPost?'rgba(212,168,83,0.15)':'rgba(44,26,14,0.07)'};color:${u.canPost?'#7a5c1e':'var(--text-sub)'};">✏️ 글쓰기 ${u.canPost?'O':'X'}</span>
      </div>
      ${!u.isAdmin ? `<button onclick="removeUser('${u.id}')" style="background:none;border:1px solid var(--rust);color:var(--rust);border-radius:8px;padding:6px 12px;font-size:0.75rem;cursor:pointer;font-family:'Noto Sans KR',sans-serif;flex-shrink:0;">탈퇴</button>` : ''}
    </div>`).join('') || `<div style="text-align:center;padding:40px;color:var(--text-sub);">승인된 구성원이 없습니다</div>`;
}

// ── 탭 3: 권한 설정 ──
function renderPermissionsTab(){
  const users = getUsers().filter(u=>u.status==='approved' && !u.isAdmin);
  if(!users.length) return `<div style="text-align:center;padding:40px;color:var(--text-sub);">권한을 설정할 구성원이 없습니다</div>`;
  return `
    <p style="font-size:0.82rem;color:var(--text-sub);margin-bottom:16px;">각 구성원의 사진 업로드 · 글쓰기 권한을 개별 설정합니다.</p>
    <div style="background:var(--cream);border-radius:10px;overflow:hidden;border:1px solid rgba(44,26,14,0.08);">
      <table style="width:100%;border-collapse:collapse;font-size:0.85rem;">
        <thead><tr style="background:rgba(44,26,14,0.05);">
          <th style="padding:12px 16px;text-align:left;color:var(--text-sub);font-weight:500;">구성원</th>
          <th style="padding:12px;text-align:center;color:var(--text-sub);font-weight:500;">📸 업로드</th>
          <th style="padding:12px;text-align:center;color:var(--text-sub);font-weight:500;">✏️ 글쓰기</th>
          <th style="padding:12px;text-align:center;color:var(--text-sub);font-weight:500;">저장</th>
        </tr></thead>
        <tbody>
        ${users.map(u=>`
          <tr style="border-top:1px solid rgba(44,26,14,0.06);">
            <td style="padding:12px 16px;">
              <span style="font-weight:500;">${u.name}</span>
              <span style="font-size:0.72rem;color:var(--text-sub);margin-left:6px;">${u.role}</span>
            </td>
            <td style="padding:12px;text-align:center;">
              <input type="checkbox" id="up-${u.id}" ${u.canUpload?'checked':''} style="width:18px;height:18px;cursor:pointer;accent-color:var(--sage);">
            </td>
            <td style="padding:12px;text-align:center;">
              <input type="checkbox" id="po-${u.id}" ${u.canPost?'checked':''} style="width:18px;height:18px;cursor:pointer;accent-color:var(--gold);">
            </td>
            <td style="padding:12px;text-align:center;">
              <button onclick="savePermission('${u.id}')" style="background:var(--brown-deep);color:var(--gold-light);border:none;border-radius:6px;padding:6px 14px;font-size:0.78rem;cursor:pointer;font-family:'Noto Sans KR',sans-serif;">저장</button>
            </td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
    <div style="margin-top:16px;padding:12px 16px;background:rgba(212,168,83,0.08);border-radius:8px;font-size:0.8rem;color:var(--text-sub);">
      💡 권한 변경은 다음 로그인 시부터 반영됩니다.
    </div>`;
}

// ── 탭 4: 비밀번호 관리 ──
function renderPwTab(){
  const users = getUsers().filter(u=>u.status==='approved');
  return `
    <p style="font-size:0.82rem;color:var(--text-sub);margin-bottom:16px;">관리자가 구성원 비밀번호를 초기화합니다. (본인 확인 후 새 비밀번호를 직접 설정하도록 안내하세요)</p>
    <div style="margin-bottom:16px;">
      <label style="display:block;font-size:0.8rem;color:var(--text-sub);margin-bottom:6px;">구성원 선택</label>
      <select id="pw-select" style="width:100%;padding:10px 14px;border:1.5px solid rgba(44,26,14,0.12);border-radius:8px;font-family:'Noto Sans KR',sans-serif;background:var(--cream);font-size:0.88rem;outline:none;">
        ${users.map(u=>`<option value="${u.id}">${u.name} (${u.role})</option>`).join('')}
      </select>
    </div>
    <div style="margin-bottom:16px;">
      <label style="display:block;font-size:0.8rem;color:var(--text-sub);margin-bottom:6px;">새 임시 비밀번호</label>
      <input type="text" id="pw-new" placeholder="임시 비밀번호 입력" style="width:100%;padding:10px 14px;border:1.5px solid rgba(44,26,14,0.12);border-radius:8px;font-family:'Noto Sans KR',sans-serif;background:var(--cream);font-size:0.88rem;outline:none;">
    </div>
    <button onclick="resetPw()" style="width:100%;padding:12px;background:var(--brown-deep);color:var(--gold-light);border:none;border-radius:8px;font-family:'Noto Sans KR',sans-serif;font-size:0.9rem;cursor:pointer;">🔑 비밀번호 초기화</button>
    <hr style="border:none;border-top:1px solid rgba(44,26,14,0.08);margin:24px 0;">
    <p style="font-size:0.82rem;color:var(--text-sub);margin-bottom:12px;"><strong>내 비밀번호 변경</strong></p>
    <div style="margin-bottom:10px;">
      <label style="display:block;font-size:0.8rem;color:var(--text-sub);margin-bottom:6px;">현재 비밀번호</label>
      <input type="password" id="my-pw-old" style="width:100%;padding:10px 14px;border:1.5px solid rgba(44,26,14,0.12);border-radius:8px;font-family:'Noto Sans KR',sans-serif;background:var(--cream);font-size:0.88rem;outline:none;">
    </div>
    <div style="margin-bottom:10px;">
      <label style="display:block;font-size:0.8rem;color:var(--text-sub);margin-bottom:6px;">새 비밀번호</label>
      <input type="password" id="my-pw-new" style="width:100%;padding:10px 14px;border:1.5px solid rgba(44,26,14,0.12);border-radius:8px;font-family:'Noto Sans KR',sans-serif;background:var(--cream);font-size:0.88rem;outline:none;">
    </div>

}

// ── 승인 ──
function approveUser(id){
  const users = getUsers();
  const u = users.find(u=>u.id===id);
  if(!u) return;
  u.status = 'approved';
  u.canUpload = true;
  u.canPost = true;
  u.joinedAt = new Date().toISOString();
  saveUsers(users);
  apTab('pending');
  showToast(`✅ "${u.name}" 님의 가입을 승인했습니다`);
}

// ── 거절 ──
function rejectUser(id){
  if(!confirm('이 신청을 거절하시겠습니까?')) return;
  const users = getUsers();
  const u = users.find(u=>u.id===id);
  if(!u) return;
  u.status = 'rejected';
  saveUsers(users);
  apTab('pending');
  showToast(`❌ "${u.name}" 님의 가입이 거절되었습니다`);
}

// ── 탈퇴 처리 ──
function removeUser(id){
  if(!confirm('이 구성원을 탈퇴 처리하시겠습니까?')) return;
  const users = getUsers().filter(u=>u.id!==id);
  saveUsers(users);
  apTab('members');
  showToast('구성원이 탈퇴 처리되었습니다');
}

// ── 권한 저장 ──
function savePermission(id){
  const users = getUsers();
  const u = users.find(u=>u.id===id);
  if(!u) return;
  u.canUpload = document.getElementById('up-'+id)?.checked || false;
  u.canPost   = document.getElementById('po-'+id)?.checked || false;
  saveUsers(users);
  showToast(`✅ "${u.name}" 권한이 저장되었습니다`);
}

// ── 비밀번호 초기화 ──
function resetPw(){
  const id = document.getElementById('pw-select')?.value;
  const pw = document.getElementById('pw-new')?.value;
  if(!id || !pw) { showToast('구성원과 새 비밀번호를 입력해주세요', true); return; }
  if(pw.length < 4) { showToast('비밀번호는 4자 이상이어야 합니다', true); return; }
  const users = getUsers();
  const u = users.find(u=>u.id===id);
  if(!u) return;
  u.pw = btoa(pw);
  saveUsers(users);
  document.getElementById('pw-new').value = '';
  showToast(`✅ "${u.name}" 비밀번호가 초기화되었습니다`);
}

// ── 내 비밀번호 변경 ──
function changeMyPw(){
  const oldPw = document.getElementById('my-pw-old')?.value;
  const newPw = document.getElementById('my-pw-new')?.value;
  if(!oldPw || !newPw) { showToast('현재/새 비밀번호를 모두 입력해주세요', true); return; }
  const users = getUsers();
  const u = users.find(u=>u.id===SESSION.id);
  if(!u || u.pw !== btoa(oldPw)) { showToast('현재 비밀번호가 맞지 않습니다', true); return; }
  if(newPw.length < 6) { showToast('새 비밀번호는 6자 이상이어야 합니다', true); return; }
  u.pw = btoa(newPw);
  saveUsers(users);
  document.getElementById('my-pw-old').value='';
  document.getElementById('my-pw-new').value='';
  showToast('✅ 비밀번호가 변경되었습니다');
}

// ── 토스트 알림 ──
function showToast(msg, isError=false){
  let t = document.getElementById('toast-msg');
  if(!t){
    t = document.createElement('div');
    t.id = 'toast-msg';
    t.style.cssText='position:fixed;bottom:28px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:24px;font-size:0.88rem;font-family:Noto Sans KR,sans-serif;z-index:9999;transition:opacity 0.4s;box-shadow:0 8px 24px rgba(0,0,0,0.2);white-space:nowrap;';
    document.body.appendChild(t);
  }
  t.style.background = isError ? 'var(--rust)' : 'var(--brown-deep)';
  t.style.color = isError ? '#fff' : 'var(--gold-light)';
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.style.opacity='0', 3000);
}

function searchRecords(query) {
  if (!query.trim()) { renderGallery(); return; }
  const q = query.toLowerCase();
  const records = getRecords().filter(r =>
    (r.title||'').toLowerCase().includes(q) ||
    (r.person||'').toLowerCase().includes(q) ||
    (r.location||'').toLowerCase().includes(q) ||
    (r.event||'').toLowerCase().includes(q)
  );
  showPage('gallery');
  document.getElementById('photo-grid').innerHTML = records.length
    ? records.map(renderPhotoCard).join('')
    : `<div class="empty-state" style="grid-column:1/-1"><div class="icon">🔍</div><h3>"${query}" 검색 결과 없음</h3></div>`;
}

// ════════ GOOGLE DRIVE 유틸 ════════
function driveShareToImg(url) {
  if (!url) return null;
  let m = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
  if (m) return `https://drive.google.com/thumbnail?id=${m[1]}&sz=w800`;
  m = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if (m) return `https://drive.google.com/thumbnail?id=${m[1]}&sz=w800`;
  return null;
}
function driveShareToOpen(url) {
  if (!url) return url;
  const m = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
  if (m) return `https://drive.google.com/file/d/${m[1]}/view`;
  return url;
}

function previewDriveLink(url) {
  const box      = document.getElementById('drive-preview');
  const img      = document.getElementById('drive-preview-img');
  const fallback = document.getElementById('drive-preview-fallback');
  if (!url || url.length < 10) { box.style.display = 'none'; return; }
  const imgUrl = driveShareToImg(url);
  box.style.display = 'block';
  if (imgUrl) {
    img.src = imgUrl; img.style.display = 'block'; fallback.style.display = 'none';
    img.onerror = () => { img.style.display = 'none'; fallback.style.display = 'block'; };
  } else {
    img.style.display = 'none'; fallback.style.display = 'block';
  }
}

// ════════ 웹 호스팅 유틸 ════════
function getHostImgUrl() {
  if (currentHostType === 'custom') {
    return document.getElementById('inp-host-direct')?.value.trim() || '';
  }
  const base = (document.getElementById('inp-host-base')?.value.trim() || '').replace(/\/$/, '');
  const path = (document.getElementById('inp-host-path')?.value.trim() || '').replace(/^\//, '');
  if (!base || !path) return '';
  return `${base}/images/${path}`;
}

function previewHostImg() {
  const url     = getHostImgUrl();
  const box     = document.getElementById('host-preview');
  const img     = document.getElementById('host-preview-img');
  const fallback= document.getElementById('host-preview-fallback');
  if (!url) { box.style.display = 'none'; return; }
  box.style.display = 'block';
  img.src = url; img.style.display = 'block'; fallback.style.display = 'none';
  img.onerror = () => { img.style.display = 'none'; fallback.style.display = 'block'; };
}

// ════════ MODAL ════════
function openUpload() {
  if (!canUpload()) {
    showToast('🔒 업로드 권한이 없습니다. 관리자에게 문의하세요.', true);
    return;
  }
  // 폼 초기화
  ['inp-gdrive','inp-title','inp-location','inp-memo','inp-host-base','inp-host-path','inp-host-direct'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value = '';
  });
  document.getElementById('inp-date').value  = new Date().toISOString().slice(0,10);
  document.getElementById('inp-event').value = 'travel';
  document.getElementById('inp-decade').value= '2020s';
  // 미리보기 숨기기
  ['drive-preview','host-preview'].forEach(id => {
    const el = document.getElementById(id); if (el) el.style.display = 'none';
  });
  // ★ 패널 초기화 — Drive 모드로 강제 리셋
  currentUploadMode = 'drive';
  currentHostType   = 'github';
  const drivePanel = document.getElementById('panel-drive');
  const hostPanel  = document.getElementById('panel-host');
  if (drivePanel) { drivePanel.style.cssText = 'display:block !important'; }
  if (hostPanel)  { hostPanel.style.cssText  = 'display:none !important'; }
  document.querySelectorAll('.umode-card').forEach(el => el.classList.remove('active'));
  const driveCard = document.getElementById('umode-drive');
  if (driveCard) driveCard.classList.add('active');
  // 모달 열기
  document.getElementById('modal-overlay').classList.add('open');
}
function closeUpload() {
  document.getElementById('modal-overlay').classList.remove('open');
}
function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) closeUpload();
}

function saveRecord() {
  const title   = document.getElementById('inp-title')?.value.trim() || '';
  const date    = document.getElementById('inp-date')?.value || '';
  const persons = [...(document.getElementById('inp-person')?.selectedOptions||[])].map(o=>o.value);
  const event   = document.getElementById('inp-event')?.value || '';
  const location= document.getElementById('inp-location')?.value.trim() || '';
  const decade  = document.getElementById('inp-decade')?.value || '';
  const memo    = document.getElementById('inp-memo')?.value.trim() || '';

  if (!title) { showToast('제목을 입력해주세요', true); return; }

  let imgUrl = '', openUrl = '', uploadMode = currentUploadMode;

  if (currentUploadMode === 'drive') {
    const driveUrl = document.getElementById('inp-gdrive')?.value.trim() || '';
    if (!driveUrl) { showToast('Google Drive 링크를 입력해주세요', true); return; }
    imgUrl  = driveShareToImg(driveUrl) || '';
    openUrl = driveShareToOpen(driveUrl);
  } else {
    imgUrl  = getHostImgUrl();
    openUrl = imgUrl;
    if (!imgUrl) { showToast('이미지 URL을 입력해주세요', true); return; }
  }

  const record = {
    id: Date.now(), title, date,
    person: persons.join(', '), event, location, decade, memo,
    imgUrl, openUrl, uploadMode,
    hostType: currentUploadMode === 'host' ? currentHostType : null,
    author:     SESSION.id   || '관리자',
    authorName: SESSION.name || SESSION.id || '관리자',
    created: new Date().toISOString(),
  };

  const records = getRecords();
  records.push(record);
  saveRecords(records);
  refreshStats(); renderRecentEvents(); renderEventList(); renderGallery();
  closeUpload();
  showToast('✅ 기록이 저장되었습니다!');
}
